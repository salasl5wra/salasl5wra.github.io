<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal EHS - WRA</title>
    <style>
        :root {
            --whr-navy: #003b71; /* Azul marino principal corporativo */
            --whr-blue: #009cde; /* Azul claro para íconos/botones */
            --whr-light-bg: #f4f4f4; /* Fondo gris claro de las tarjetas */
            --whr-text-dark: #333333;
            --whr-text-gray: #666666;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            background-color: #ffffff; 
            color: var(--whr-text-dark); 
        }
        
        /* Barra de navegación superior */
        .top-nav { 
            background-color: var(--whr-navy); 
            color: white; 
            padding: 15px 30px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            font-size: 0.9rem;
        }

        .top-nav .logo { 
            font-weight: bold; 
            font-size: 1.2rem; 
            letter-spacing: 1px;
        }
        
        /* Sección principal (Hero) */
        .hero { 
            text-align: center; 
            padding: 60px 20px 40px; 
            background-color: #ffffff; 
        }
        
        .hero h1 { 
            color: var(--whr-navy); 
            font-size: 2.5rem; 
            font-weight: 300; 
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        /* Contenedor central */
        .container { 
            max-width: 1100px; 
            margin: 0 auto; 
            padding: 0 20px 60px; 
        }

        /* Grid de íconos cuadrados (Idéntico a la imagen) */
        .quick-links { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); 
            gap: 15px; 
            justify-content: center;
        }

        /* Estilo de la tarjeta cuadrada */
        .link-card { 
            background-color: var(--whr-light-bg); 
            padding: 30px 15px; 
            text-align: center; 
            text-decoration: none; 
            color: var(--whr-text-gray); 
            transition: background-color 0.2s, transform 0.2s; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        .link-card:hover { 
            background-color: #e8e8e8; 
        }

        /* Círculo azul para el ícono */
        .icon-circle { 
            background-color: var(--whr-blue); 
            color: white; 
            width: 70px; 
            height: 70px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 32px; 
            margin-bottom: 15px; 
        }

        .link-title { 
            font-size: 0.95rem; 
            font-weight: 400; 
            line-height: 1.3;
            color: var(--whr-text-gray);
        }

        /* Barra de sección inferior */
        .section-header { 
            background-color: var(--whr-navy); 
            color: white; 
            padding: 12px 20px; 
            margin-top: 50px; 
            font-weight: 500; 
        }

        .section-content { 
            border: 1px solid #e0e0e0; 
            border-top: none;
            padding: 40px; 
            text-align: center;
            background-color: white;
        }

        .btn-portal {
            display: inline-block; 
            background-color: var(--whr-blue); 
            color: white; 
            text-decoration: none; 
            padding: 10px 25px; 
            border-radius: 4px; 
            margin-top: 15px;
            font-size: 0.9rem;
            transition: background-color 0.2s;
        }

        .btn-portal:hover {
            background-color: #0088c2;
        }

    </style>
</head>
<body>

    <!-- Barra superior -->
    <div class="top-nav">
        <div class="logo">WRA</div>
        <div>Portal EHS</div>
    </div>

    <!-- Encabezado -->
    <div class="hero">
        <h1>Portal de Medio Ambiente, Salud y Seguridad</h1>
    </div>

    <div class="container">
        
        <!-- Tarjetas tipo portal corporativo -->
        <div class="quick-links">
            <a href="#" class="link-card">
                <div class="icon-circle">📋</div>
                <div class="link-title">Inspecciones</div>
            </a>

            <a href="#" class="link-card">
                <div class="icon-circle">📊</div>
                <div class="link-title">Tablero WCM</div>
            </a>

            <a href="#" class="link-card">
                <div class="icon-circle">⚠️</div>
                <div class="link-title">Reportes<br>Disciplinarios</div>
            </a>

            <a href="#" class="link-card">
                <div class="icon-circle">🚀</div>
                <div class="link-title">Proyectos<br>de EHS</div>
            </a>

            <a href="#" class="link-card">
                <div class="icon-circle">📚</div>
                <div class="link-title">Entrenamientos</div>
            </a>

            <a href="#" class="link-card">
                <div class="icon-circle">📅</div>
                <div class="link-title">Calendarios</div>
            </a>
        </div>

        <!-- Panel Inferior -->
        <div class="section-header">
            Avisos y Comunicados EHS
        </div>
        <div class="section-content">
            <p style="color: #666; margin-top: 0;">Centro de recursos e información general de seguridad en planta.</p>
            <a href="#" class="btn-portal">Ir a Whirlpool 360</a>
        </div>

    </div>

</body>
</html>
